<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frozen Planet - Angel Rendón Illustration</title>
    <link rel="icon" href="icon.png" type="image/x-icon">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&display=swap" rel="stylesheet">

    <style>
        /* PAGE OVERALL STYLE */
        body {
            margin: 0;
            padding: 0;
            font-family: Google Sans Flex, sans-serif;
            background-color: #f9f9f9;
        }

         
        /* LOGO */
        .class-logo {
            text-align: center;
            padding-top: 50px;
            padding-bottom: 30px;
        }
        .class-logo img {
            max-width: 150px;
            height: auto;
        }

        /* IMAGE 1 */
        .class-image-1 {
            text-align: left;
            padding: 0 20px;
        }
        .class-image-1 img {
            max-width: 800px;
            width: 100%;
            height: auto;
            cursor: zoom-in;
        }

    </style>
</head>

<body>
    <!-- LOGO -->
    <header class="class-logo">
        <a href="index.html">
            <img src="logo.png" alt="Logo">
        </a>
    </header>

    <main>

        <!-- IMAGE AND TEXT FLEXBOX -->
        <div style="display: flex; flex-wrap: wrap; align-items: top; gap: 20px; margin: 20px;">
            <section class="class-image-1">
                <img 
                    src="polar-bears-landscape.png" 
                    alt="Image 1"
                    onclick="document.getElementById('zoom').style.display= 'flex'">
            </section>

            <div style="flex: 1; min-width: 250px;">
                <h4 style="color: rgb(29, 52, 58);">Frozen Planet</h4>
                <p style="color: rgb(29, 52, 58); font-weight: 300;">Personal project inspired by the Frozen Planet series</p>
            </div>
        </div>

        <!-- PORTFOLIO BUTTON -->
        <div style="text-align: right;">
            <a href="index.html" style="display: inline-block; margin: 20px; text-decoration: none; color: rgb(29, 58, 58);" >Want To Go Back?</a>
        </div>

        <!-- ZOOM -->
        <div id="zoom"
            style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgb(249, 249, 249); justify-content: center; align-items: center; z-index: 1000;"
            onclick="this.style.display = 'none'">

            <img src="polar-bears-landscape.png"
                alt="Zoomed image"
                style="max-width: 90%; max-height: 90%;">
        </div>
        
    </main>
    
</body>
</html>
