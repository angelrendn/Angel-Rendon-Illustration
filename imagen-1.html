<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frozen Planet</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&display=swap" rel="stylesheet">

    <style>
        /* ESTILO GENERAL DE LA PAGINA */
        body {
            margin: 0;
            padding: 0;
            font-family: Google Sans Flex, sans-serif;
            background-color: #f9f9f9;
        }

        .contenedor-logo {
            text-align: center;
            padding-top: 50px;
            padding-bottom: 30px;
        }
        .contenedor-logo img {

            height: auto;
        }

        .contenedor-imagen-1 {
            text-align: left;
            padding: 0 20px;
        }
        .contenedor-imagen-1 img {
            max-width: 800px;
            width: 100%;
            height: auto;
        }

    </style>
</head>

<body>

    <header class="contenedor-logo">
        <img src="logo.png" alt="Logo">
    </header>

    <main>

        <div style="display: flex; align-items: top; gap: 20px; margin: 20px;">
            <section class="contenedor-imagen-1">
                <img src="polar-bears-landscape.png" alt="Imagen 1">
            </section>

            <div>
                <h3 style="color: rgb(29, 52, 58);">Frozen Planet</h3>
                <p style="color: rgb(29, 52, 58);">Personal project inspired by the Frozen Planet series</p>
            </div>
        </div>

        <div style="text-align: right;">
            <a href="index.html" style="display: inline-block; margin: 20px; text-align: right;" >Portfolio</a>
