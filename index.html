<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Angel Rendón Illustration</title>
    <link rel="icon" href="icon.png" type="image/x-icon">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&display=swap" rel="stylesheet">

    
    <style>
        /* PAGE OVERALL STYLE */
        body {
            margin: 0;
            padding: 0;
            font-family: Google Sans Flex, sans-serif;
            background-color: #f9f9f9;
        }

        /* LOGO */
        .class-logo {
            text-align: center;
            padding-top: 50px;
            padding-bottom: 30px;
        }
        .class-logo img {
            max-width: 150px;
            height: auto;
        }

        /* IMAGE 1 */
        .class-image-1 {
            text-align: center;
            padding: 0 20px;
        }
        .class-image-1 img {
            max-width: 700px;
            width: 100%;
            height: auto;
            cursor: pointer; /* Cambia el cursor a una manito */
            transition: transform 0.3s ease; /* Animación al pasar el ratón */
        }
        .class-image-1 img:hover {
            transform: scale(1.02); /* Hace que la imagen crezca al pasar el mouse */
        }

    </style>
</head>
<body>
    <!-- LOGO -->
    <header class="class-logo">
        <a href="index.html">
            <img src="logo.png" alt="Logo">
        </a>
        <!-- MENU -->
        <div style="text-align: center;">
            <a href="index.html" style="display: inline-block; margin: 40px 20px 20px 20px; text-decoration: none; color: rgb(29, 58, 58);" >About/Contact</a>
        </div>
    </header>

    
    <main>
        <!-- IMAGE 1 -->
        <section class="class-image-1">
            <a href="image-1.html">
                <img src="polar-bears-landscape.png" alt="Image 1">
            </a>
        </section>
    </main>

</body>
</html>
