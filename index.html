<!DOCTYPE html>
<html lnag="es">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Angel Rendon Illustration</title>

    <style>
      /* ESTILO GENERAL DE LA PAGINA */
      body{
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
        background-color: #f9f9f9;
      }
       /* CONTENEDORES LOGO */
      .contenedor-logo{
        text-align: center;
        padding-top: 50px;
        padding-bottom: 50px;
      }
      .contenedor-logo img{
        max-width: 150px;
        height: auto;
      }
       /* CONTENEDORES IMAGEN 1 */
      .contenedor-imagen-1{
        text-align: center;
        padding: 0 20px;
      }
      .contenedor-imagen-1 img{
        max-width: 700px;
        width: 100%;
        heigth: auto;
        cursor: pointer; /* Cambia el cursor a una manito */
        transition: transform 0.3s ease; /* animación al pasar el ratón */
      }
      .contenedor-imagen-1 img:hover{
        transform: scale(1.02); /* Hace que la imagen crezca un poquito al pasar el mouse */
      }
      /* ESTILO DEL MODAL (LIGHTBOX) */
      .modal{
        display: none;
        position: fixed;
        z-index: 1000;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0); /* Fondo negro semitransparente */

        justify-content: center;
        align-items: center;
      }
      /* CAJA BLANCA DENTRO DEL MODAL */
      modal-contenido{
        display: flex;
        background-color: white;
        padding: 20px;
        max-width: 900px;
        width: 90%;
        gap: 20px; /* Espacio entre la imagen y el texto */
        box-sizing: border-box;
        position: relative;
      }
      /* IMAGEN DENTRO DEL MODAL */
      .modal-imagen{
        max-width: 50%;
        height: auto;
        object-fit: cover;
      }
      /* TEXTO DENTRO DEL MODAL */
      .modal-texto{
        display: flex;
        flex-direction: column;
        justify-content: center;
      }
      /* BOTON (X) PARA CERRAR */
      .cerrar{
        position: absolute;
        top: 10px;
        rigth: 20px;
        color: #333;
        font-size: 30px;
        font-weight: bold;
        cursor: pointer;
      }
      .cerrar:hover{
        color: red;
      }
      /* ADAPTACION PARA MOVILES */
      @media (max-width: 768px){
        .modal-contenido{
          flex-direction: column;
        }
        .modal-imagen{
          max-width: 100%;
        }
      }
      
      
    </style>
  </head>
  <body>
    <header class="contenedor-logo">
      <img src="logo.png" alt="logo">
    </header>
    
    <main>
      <section class="contenedor-imagen-1">
        <img id="miniatura" src="polar-bears-landscape.png" alt="imagen 1">
      </section>
    </main>

    <div id="miModal" class="modal">
      <div class="modal-contenido">
        <span class="cerrar" id="botonCerrar">&times;</span>
        <img class="modal-imagen" id="imagenEnorme" src="" alt="Imagen ampliada">

        <div class="modal-texto">
          <h2>Frozen Planet</h2>
          <p>Personal project</p>
        </div>
      </div>
    </div>

    <script>
      const miniatura= document.getElementById('miniatura');
      const modal= document.getElementById('miModal');
      const imagenEnorme= document.getElementById('imagenEnorme');
      const botonCerrar= document.getElementById('botonCerrar');

      miniatura.addEventListener('click', function(){
        modal.style.display= 'flex';
        imagenEnorme.src= this.src;
      });

      botonCerrar.addEventListener('click', function(){
        modal.style.display= 'none';
      });

      window.addEventListener('click', function(event){
        if (event.target == modal){
          modal.style.display = 'none';
        }
      });
    </script>
    
  </body>
</html>
